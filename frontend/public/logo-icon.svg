<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80">
  <defs>
    <style>
      #bgGradient stop:nth-child(1) { stop-color: var(--p-primary-700, #047857); }
      #bgGradient stop:nth-child(2) { stop-color: var(--p-primary-600, #059669); }
      #bgGradient stop:nth-child(3) { stop-color: var(--p-primary-400, #10b981); }
      #iconShadow feDropShadow { flood-color: var(--p-primary-700, #047857); }
    </style>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"/>
      <stop offset="50%"/>
      <stop offset="100%"/>
    </linearGradient>
    <filter id="iconShadow" x="-15%" y="-15%" width="130%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-opacity="0.25"/>
    </filter>
  </defs>

  <rect x="4" y="4" width="72" height="72" rx="18"
        fill="url(#bgGradient)" filter="url(#iconShadow)"/>
  <rect x="4" y="4" width="72" height="36" rx="18"
        fill="white" opacity="0.08"/>

  <g transform="translate(40, 40)">
    <ellipse cx="0" cy="0" rx="22" ry="22"
             fill="none" stroke="white" stroke-width="2" opacity="0.2"/>
    <path d="M-16 0 C-16 -10, -6 -16, 0 -16 C6 -16, 16 -10, 16 0"
          fill="none" stroke="white" stroke-width="4" stroke-linecap="round"/>
    <path d="M16 0 C16 10, 6 16, 0 16 C-6 16, -16 10, -16 0"
          fill="none" stroke="white" stroke-width="4" stroke-linecap="round"/>
    <circle cx="0" cy="0" r="5" fill="white"/>
    <circle cx="-16" cy="0" r="3.5" fill="white" opacity="0.9"/>
    <circle cx="16" cy="0" r="3.5" fill="white" opacity="0.9"/>
    <circle cx="-8" cy="-12" r="2" fill="white" opacity="0.6">
      <animate attributeName="opacity" values="0.6;0.3;0.6" dur="1.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="8" cy="12" r="2" fill="white" opacity="0.6">
      <animate attributeName="opacity" values="0.3;0.6;0.3" dur="1.5s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>
