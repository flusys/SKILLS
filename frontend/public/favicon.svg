<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <style>
      #favBrandGradient stop:nth-child(1) { stop-color: var(--p-primary-700, #047857); }
      #favBrandGradient stop:nth-child(2) { stop-color: var(--p-primary-600, #059669); }
      #favBrandGradient stop:nth-child(3) { stop-color: var(--p-primary-400, #10b981); }
    </style>
    <linearGradient id="favBrandGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"/>
      <stop offset="50%"/>
      <stop offset="100%"/>
    </linearGradient>
  </defs>

  <rect width="32" height="32" rx="7" fill="url(#favBrandGradient)"/>
  <rect width="32" height="14" rx="7" fill="white" opacity="0.1"/>

  <g transform="translate(16, 16)">
    <path d="M-8 0 C-8 -5, -3 -8, 0 -8 C3 -8, 8 -5, 8 0"
          fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M8 0 C8 5, 3 8, 0 8 C-3 8, -8 5, -8 0"
          fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="0" cy="0" r="2.5" fill="white"/>
    <circle cx="-8" cy="0" r="1.8" fill="white" opacity="0.85"/>
    <circle cx="8" cy="0" r="1.8" fill="white" opacity="0.85"/>
  </g>
</svg>
